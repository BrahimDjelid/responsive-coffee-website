<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coffee Website</title>

    <!-- Global stylesheet -->
    <link rel="stylesheet" href="css/styles.css" />

    <!-- Font Awesome icon kit -->
    <script
      src="https://kit.fontawesome.com/cc77ff5b40.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <!-- Header / Navbar -->
    <header>
      <div class="container">
        <nav class="navbar">
          <!-- Logo / brand -->
          <a href="#hero" class="nav-logo">
            <h2 class="logo-text">
              <i class="fa-solid fa-mug-saucer"></i>Coffee
            </h2>
          </a>

          <!-- Hamburger icon: opens the mobile nav menu -->
          <div class="toggle-menu" id="open-menu">
            <i class="fa-solid fa-bars"></i>
          </div>

          <!-- Navigation links (becomes a slide-in panel on mobile) -->
          <ul class="nav-menu" id="nav-menu">
            <!-- "X" icon: closes the mobile nav menu -->
            <div class="close-menu" id="close-menu">
              <i class="fa-solid fa-xmark"></i>
            </div>

            <li class="nav-item">
              <a href="#" class="nav-link">Home</a>
            </li>
            <li class="nav-item">
              <a href="#" class="nav-link">About</a>
            </li>
            <li class="nav-item">
              <a href="#" class="nav-link">Menu</a>
            </li>
            <li class="nav-item">
              <a href="#" class="nav-link">Testimonials</a>
            </li>
            <li class="nav-item">
              <a href="#" class="nav-link">Gallery</a>
            </li>
            <li class="nav-item">
              <a href="#" class="nav-link">Contact</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <!-- Hero section -->
    <main>
      <div class="hero-section" id="hero">
        <div class="container">
          <!-- Text content -->
          <div class="hero-details">
            <h2 class="title">Best Coffee</h2>
            <h3 class="subtitle">
              Make your day great with our special coffee!
            </h3>
            <p class="description">
              Welcome to our coffee paradise, where every bean tells a story and
              every cup sparks joy.
            </p>

            <!-- Call-to-action buttons -->
            <div class="buttons">
              <a href="#" class="button order-now">Order Now</a>
              <a href="#" class="button contact-us">Order Contact Us</a>
            </div>
          </div>

          <!-- Hero illustration -->
          <div class="hero-image-wrapper">
            <img
              src="images/coffee-hero-section.png"
              alt="Coffee"
              class="hero-image"
            />
          </div>
        </div>
      </div>
    </main>

    <!-- Scripts -->
    <script src="js/script.js"></script>
  </body>
</html>
